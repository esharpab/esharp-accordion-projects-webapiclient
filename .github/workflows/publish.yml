name: Build and Publish NuGet Package

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore WebApiClient/WebApiClient.csproj

      - name: Restore test dependencies
        run: dotnet restore WebApiClient.Tests/WebApiClient.Tests.csproj

      - name: Build
        run: dotnet build WebApiClient/WebApiClient.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test WebApiClient.Tests/WebApiClient.Tests.csproj --configuration Release --verbosity normal --filter "TestCategory!=Integration&TestCategory!=Performance"

      - name: Pack
        run: dotnet pack WebApiClient/WebApiClient.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
